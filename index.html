<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070d1a">
<title>CLUB GENESIS — 経理</title>
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070d1a;--bg2:#0d1526;--bg3:#121d30;--bg4:#1a2640;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e8edf5;--text2:#9aaabb;--text3:#556070;
  --gold:#c9a84c;--gold2:rgba(201,168,76,.12);--gold-border:rgba(201,168,76,.3);
  --blue:#4a9eff;--blue2:rgba(74,158,255,.1);
  --green:#4ade80;--green2:rgba(74,222,128,.1);
  --red:#ff6b6b;--red2:rgba(255,107,107,.1);
  --orange:#ffa040;--orange2:rgba(255,160,64,.1);
  --purple:#a78bfa;--purple2:rgba(167,139,250,.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;}

/* ===== LOGIN ===== */
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d1f3a 0%,var(--bg) 70%);}
.login-box{width:100%;max-width:360px;padding:40px 32px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;}
.login-logo{text-align:center;margin-bottom:8px;font-size:22px;font-weight:800;letter-spacing:.12em;color:var(--gold);}
.login-sub{text-align:center;font-size:11px;color:var(--text3);letter-spacing:.15em;margin-bottom:32px;}
.login-label{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-bottom:6px;}
.login-input-wrap{position:relative;margin-bottom:20px;}
.login-input{width:100%;padding:12px 44px 12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;outline:none;}
.login-input:focus{border-color:rgba(201,168,76,.5);}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#b8960c,var(--gold));border:none;border-radius:8px;color:#1a0f00;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;}
.login-btn:active{opacity:.85;}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:18px;}

/* ===== HEADER ===== */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;}
.hdr-logo{font-size:13px;font-weight:800;letter-spacing:.1em;color:var(--gold);white-space:nowrap;}
.hdr-sub{font-size:10px;color:var(--text3);letter-spacing:.1em;}
.hdr-sync{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green);margin-left:auto;white-space:nowrap;}
.hdr-sync.err{background:var(--red2);border-color:rgba(255,107,107,.25);color:var(--red);}
.hdr-logout{padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text3);font-size:12px;cursor:pointer;white-space:nowrap;}

/* ===== DATE NAV ===== */
.date-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.date-arrow{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.date-arrow:active{opacity:.7;}
.date-display{flex:1;text-align:center;}
.date-display-main{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.05em;}
.date-display-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.date-input{padding:7px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;}

/* ===== CONTENT ===== */
#content{flex:1;padding:16px;max-width:900px;margin:0 auto;width:100%;}

/* ===== SUMMARY CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
@media(min-width:600px){.cards{grid-template-columns:repeat(6,1fr);}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;}
.card-label{font-size:10px;color:var(--text3);letter-spacing:.06em;margin-bottom:4px;}
.card-val{font-size:16px;font-weight:700;}
.card-val.gold{color:var(--gold);}
.card-val.blue{color:var(--blue);}
.card-val.green{color:var(--green);}
.card-val.orange{color:var(--orange);}
.card-val.text{color:var(--text);}

/* ===== SECTION ===== */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.sec-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sec-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.06em;}
.sec-body{padding:12px 16px;}

/* ===== CATEGORY TABLE ===== */
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.cat-row:last-child{border-bottom:none;}
.cat-label{font-size:13px;color:var(--text2);}
.cat-badge{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 7px;border-radius:10px;margin-left:6px;}
.cat-val{font-size:13px;font-weight:600;color:var(--text);}
.cat-val.disc{color:var(--red);}

/* ===== SESSION TABLE ===== */
.sess-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
.sess-row:last-child{border-bottom:none;}
.sess-main{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sess-table{font-size:13px;font-weight:700;color:var(--gold);min-width:60px;}
.sess-time{font-size:11px;color:var(--text3);}
.sess-guests{font-size:12px;color:var(--text2);}
.sess-tag{font-size:10px;padding:1px 7px;border-radius:10px;white-space:nowrap;}
.tag-hon{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.2);}
.tag-ban{background:var(--green2);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tag-ext{background:var(--orange2);color:var(--orange);border:1px solid rgba(255,160,64,.2);}
.tag-banext{background:var(--orange2);color:var(--orange);border:1px solid rgba(255,160,64,.35);}
.tag-cash{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.tag-card{background:var(--blue2);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.sess-total{margin-left:auto;font-size:14px;font-weight:700;color:var(--gold);}
.sess-detail{display:none;margin-top:8px;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);}
.sess-detail.open{display:block;}
.detail-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text2);}
.detail-row span:last-child{color:var(--text);}
.detail-row.disc span:last-child{color:var(--red);}
.detail-divider{border-top:1px solid var(--border);margin:6px 0;}
.detail-total{display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:4px 0;color:var(--gold);}

/* ===== CAST TABLE ===== */
.cast-grid{display:grid;grid-template-columns:1fr auto auto auto auto;gap:0;font-size:12px;}
.cast-gh{font-size:10px;color:var(--text3);padding:4px 6px;border-bottom:1px solid var(--border);}
.cast-gh:first-child{text-align:left;}
.cast-gh:not(:first-child){text-align:right;}
.cast-gr{display:contents;}
.cast-gc{padding:7px 6px;border-bottom:1px solid rgba(255,255,255,.04);}
.cast-gc:first-child{color:var(--text);font-weight:600;}
.cast-gc:not(:first-child){text-align:right;color:var(--text2);}
.cast-gc.val{color:var(--gold);font-weight:600;}
.cast-gc.val-s{color:var(--orange);font-weight:600;}

/* ===== EMPTY ===== */
.empty{padding:32px;text-align:center;color:var(--text3);font-size:13px;}

/* ===== SPINNER ===== */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--text3);}

/* ===== NO DATA ===== */
.no-data{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;padding:48px 16px;text-align:center;}
.no-data-icon{font-size:32px;margin-bottom:8px;opacity:.4;}
.no-data-text{color:var(--text3);font-size:13px;}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">CLUB GENESIS</div>
    <div class="login-sub">経理システム Ver1.0</div>
    <div class="login-label">パスワード</div>
    <div class="login-input-wrap">
      <input type="password" id="pw-input" class="login-input" placeholder="パスワードを入力" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-logo">CLUB GENESIS</div>
      <div class="hdr-sub">経理システム</div>
    </div>
    <div class="hdr-sync" id="sync-badge">接続中…</div>
    <button class="hdr-logout" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="date-nav">
    <button class="date-arrow" onclick="shiftDate(-1)">‹</button>
    <div class="date-display">
      <div class="date-display-main" id="date-main"></div>
      <div class="date-display-sub" id="date-sub"></div>
    </div>
    <button class="date-arrow" onclick="shiftDate(1)">›</button>
    <input type="date" class="date-input" id="date-jump" onchange="jumpDate(this.value)">
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div><span>データ読込中…</span></div></div>
</div>

<script>
// ===== FIREBASE =====
const cfg={apiKey:"AIzaSyD_7XgXow1D-cp-TNsbqitjMzJCGD5DE64",authDomain:"club-genesis-5cba7.firebaseapp.com",databaseURL:"https://club-genesis-5cba7-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"club-genesis-5cba7",storageBucket:"club-genesis-5cba7.firebasestorage.app",messagingSenderId:"591051426146",appId:"1:591051426146:web:08a486510b89d6be0e443b"};
firebase.initializeApp(cfg);
const db=firebase.database();

// ===== STATE =====
let S={history:[],casts:[],tables:[],config:{}};
let loaded=false;
let selDate=todayStr();

// ===== UTILS =====
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmt(n){return Math.round(Number(n||0)).toLocaleString("ja-JP");}
function dow(str){return["日","月","火","水","木","金","土"][new Date(str).getDay()];}
function dateLabel(str){const p=str.split("-");return p[0]+"年"+parseInt(p[1])+"月"+parseInt(p[2])+"日";}

function getHistForDate(date){
  const d=new Date(date+"T00:00:00");
  const s=d.getTime();
  const e=s+86400000;
  return (S.history||[]).filter(h=>h.startTime>=s&&h.startTime<e);
}

function calcCash(h){
  if(h.splits&&h.splits.length>1)return h.splits.filter(sp=>sp.method==="cash").reduce((a,sp)=>a+(sp.amount||0),0);
  return h.payMethod==="card"?0:(h.total||0);
}
function calcCard(h){
  if(h.splits&&h.splits.length>1)return h.splits.filter(sp=>sp.method==="card").reduce((a,sp)=>a+(sp.amount||0),0);
  return h.payMethod==="card"?(h.total||0):0;
}

function itemsTotal(items,pred){return (items||[]).filter(pred).reduce((a,i)=>a+Math.abs((i.price||0)*(i.qty||1)),0);}

function castHonSub(recs,cid){
  const sid=String(cid);
  const honRecs=recs.filter(h=>(h.items||[]).some(i=>i.isHonShimei&&String(i.castId)===sid));
  return honRecs.reduce((a,h)=>{
    const n=Math.max(1,(h.items||[]).filter(i=>i.isHonShimei).length);
    return a+(h.subtotal||h.total)/n;
  },0);
}
function becMatch(i,cid){return i.isBanaiExtension&&((i.banaiExtCastIds||[]).map(String).includes(cid)||(i.banaiExtCastId&&String(i.banaiExtCastId)===cid));}
function castBanaiExtSub(recs,cid){
  const sid=String(cid);
  const beRecs=recs.filter(h=>(h.items||[]).some(i=>becMatch(i,sid))&&!(h.items||[]).some(i=>i.isHonShimei));
  return beRecs.reduce((a,h)=>{
    return a+(h.items||[]).filter(i=>becMatch(i,sid)).reduce((s,i)=>{
      const n=Math.max(1,(i.banaiExtCastIds||[i.banaiExtCastId]).filter(Boolean).length);
      return s+Math.abs(i.price*(i.qty||1))/n;
    },0);
  },0);
}

// ===== FIREBASE LOAD =====
db.ref("pos").on("value",snap=>{
  const d=snap.val()||{};
  S.history=d.history?Object.values(d.history):[];
  S.casts=d.casts||[];
  S.tables=d.tables||[];
  S.config=d.config||{};
  loaded=true;
  document.getElementById("sync-badge").textContent="同期済み ✓";
  document.getElementById("sync-badge").className="hdr-sync";
  if(document.getElementById("app").classList.contains("show"))render();
},err=>{
  document.getElementById("sync-badge").textContent="接続エラー";
  document.getElementById("sync-badge").className="hdr-sync err";
});

// ===== AUTH =====
const SESSION_KEY="genesis_acc_auth";
function togglePw(){const i=document.getElementById("pw-input");i.type=i.type==="password"?"text":"password";}
function doLogin(){
  const pw=document.getElementById("pw-input").value;
  const stored=S.config.accountingPassword||"genesis";
  if(pw===stored){
    sessionStorage.setItem(SESSION_KEY,"1");
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app").classList.add("show");
    updateDateNav();
    if(loaded)render();
  }else{
    document.getElementById("login-err").textContent="パスワードが違います";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
    setTimeout(()=>{document.getElementById("login-err").textContent="";},2500);
  }
}
function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById("app").classList.remove("show");
  document.getElementById("login-wrap").style.display="flex";
  document.getElementById("pw-input").value="";
}
// Auto-login if session exists
window.addEventListener("DOMContentLoaded",()=>{
  if(sessionStorage.getItem(SESSION_KEY)==="1"){
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app").classList.add("show");
    updateDateNav();
  }
  if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js");
});

// ===== DATE NAV =====
function shiftDate(delta){
  const d=new Date(selDate+"T12:00:00");
  d.setDate(d.getDate()+delta);
  selDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  updateDateNav();render();
}
function jumpDate(v){if(v){selDate=v;updateDateNav();render();}}
function updateDateNav(){
  document.getElementById("date-main").textContent=dateLabel(selDate)+" ("+dow(selDate)+")";
  const isToday=selDate===todayStr();
  document.getElementById("date-sub").textContent=isToday?"本日":"";
  document.getElementById("date-jump").value=selDate;
}

// ===== RENDER =====
function render(){
  if(!document.getElementById("app").classList.contains("show"))return;
  const recs=getHistForDate(selDate);
  const c=document.getElementById("content");
  if(!loaded){c.innerHTML='<div class="loading"><div class="spinner"></div><span>データ読込中…</span></div>';return;}
  if(!recs.length){c.innerHTML='<div class="no-data"><div class="no-data-icon">📋</div><div class="no-data-text">'+dateLabel(selDate)+'のデータはありません</div></div>';return;}

  // ---- サマリ計算 ----
  const totalSales=recs.reduce((a,h)=>a+(h.total||0),0);
  const totalCash=recs.reduce((a,h)=>a+calcCash(h),0);
  const totalCard=recs.reduce((a,h)=>a+calcCard(h),0);
  const totalGuests=recs.reduce((a,h)=>a+(h.guests||0),0);
  const receiptCount=recs.filter(h=>h.receiptIssued||(h.splits&&h.splits.some(sp=>sp.receipt))).length;

  // ---- カテゴリ集計 ----
  const allItems=recs.flatMap(h=>h.items||[]);
  const catSet=itemsTotal(allItems,i=>i.isSet);
  const catHon=itemsTotal(allItems,i=>i.isHonShimei);
  const catBan=itemsTotal(allItems,i=>i.isBanaiShimei);
  const catExt=itemsTotal(allItems,i=>i.isExtension&&!i.isBanaiExtension&&!i.isSC);
  const catBanExt=itemsTotal(allItems,i=>i.isBanaiExtension);
  const catVip=itemsTotal(allItems,i=>i.isVipCharge);
  const catDrink=itemsTotal(allItems,i=>!i.isSet&&!i.isHonShimei&&!i.isBanaiShimei&&!i.isExtension&&!i.isVipCharge&&!i.isDiscount&&!i.label?.includes("シングルチャージ")&&!i.label?.includes("同伴料")&&(i.id?.startsWith("cd_")||i.label?.includes("Drink")||i.label?.includes("飲")));
  const catSC=itemsTotal(allItems,i=>i.label&&i.label.includes("シングルチャージ"));
  const catDohan=itemsTotal(allItems,i=>i.label==="同伴料");
  const catDisc=itemsTotal(allItems,i=>i.isDiscount);
  const honCount=recs.reduce((a,h)=>a+(h.items||[]).filter(i=>i.isHonShimei).length,0);
  const banCount=recs.reduce((a,h)=>a+(h.items||[]).filter(i=>i.isBanaiShimei).length,0);
  const extCount=recs.flatMap(h=>(h.items||[]).filter(i=>i.isExtension&&i.extMinutes)).length;

  // ---- キャスト別 ----
  const castRows=(S.casts||[]).map(c=>{
    const cid=String(c.id);
    const honRecs=recs.filter(h=>(h.items||[]).some(i=>i.isHonShimei&&String(i.castId)===cid));
    const banRecs=recs.filter(h=>(h.items||[]).some(i=>i.isBanaiShimei&&String(i.castId)===cid));
    const beRecs=recs.filter(h=>(h.items||[]).some(i=>becMatch(i,cid)));
    const honSub=castHonSub(recs,cid);
    const beSub=castBanaiExtSub(recs,cid);
    return{name:c.name,honCnt:honRecs.length,banCnt:banRecs.length,beCnt:beRecs.length,honSub,beSub};
  }).filter(r=>r.honCnt||r.banCnt||r.beCnt);

  // ---- HTML BUILD ----
  let html="";

  // サマリカード
  html+='<div class="cards">';
  html+=card("総売上","¥"+fmt(totalSales),"gold");
  html+=card("現金","¥"+fmt(totalCash),"green");
  html+=card("カード","¥"+fmt(totalCard),"blue");
  html+=card("組数",recs.length+"組","text");
  html+=card("客数",totalGuests+"名","text");
  html+=card("領収書",receiptCount+"件","orange");
  html+='</div>';

  // カテゴリ別
  html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">カテゴリ別売上</span><span style="font-size:11px;color:var(--text3);">小計: ¥'+fmt(recs.reduce((a,h)=>a+(h.subtotal||0),0))+'</span></div><div class="sec-body">';
  html+=catRow("セット料金",catSet);
  html+=catRow("本指名料",catHon,honCount+"件");
  html+=catRow("場内指名料",catBan,banCount+"件");
  if(catDohan)html+=catRow("同伴料",catDohan);
  html+=catRow("延長料金",catExt,extCount+"件");
  if(catBanExt)html+=catRow("場内延長料金",catBanExt);
  if(catVip)html+=catRow("VIP室料",catVip);
  if(catSC)html+=catRow("シングルチャージ",catSC);
  if(catDrink)html+=catRow("ドリンク",catDrink);
  if(catDisc)html+='<div class="cat-row"><span class="cat-label">割引</span><span class="cat-val disc">-¥'+fmt(catDisc)+'</span></div>';
  html+='</div></div>';

  // テーブル別
  html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">テーブル別一覧</span><span style="font-size:11px;color:var(--text3);">'+recs.length+'件</span></div><div class="sec-body" style="padding:0 16px;">';
  [...recs].sort((a,b)=>a.startTime-b.startTime).forEach((h,i)=>{
    const inT=new Date(h.startTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const outT=h.endTime?new Date(h.endTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"—";
    const honNames=(h.items||[]).filter(i=>i.isHonShimei).map(i=>i.label.replace("本指名料 (","").replace(")","").trim());
    const banNames=(h.items||[]).filter(i=>i.isBanaiShimei).map(i=>i.label.replace("場内指名料 (","").replace(")","").trim());
    const hasExt=(h.items||[]).some(i=>i.isExtension&&i.extMinutes);
    const hasBanExt=(h.items||[]).some(i=>i.isBanaiExtension);
    const payM=h.payMethod==="card"?"card":"cash";
    const payLabel=h.splits&&h.splits.length>1?"分割":(payM==="card"?"カード":"現金");
    html+='<div class="sess-row" onclick="toggleDetail('+i+')">';
    html+='<div class="sess-main">';
    html+='<span class="sess-table">'+(h.tableLabel||"—")+'</span>';
    html+='<span class="sess-time">'+inT+'→'+outT+'</span>';
    html+='<span class="sess-guests">'+h.guests+'名</span>';
    if(honNames.length)html+='<span class="sess-tag tag-hon">本: '+honNames.join("・")+'</span>';
    if(banNames.length)html+='<span class="sess-tag tag-ban">場: '+banNames.join("・")+'</span>';
    if(hasBanExt)html+='<span class="sess-tag tag-banext">場内延長</span>';
    else if(hasExt)html+='<span class="sess-tag tag-ext">延長</span>';
    html+='<span class="sess-tag '+(payM==="card"?"tag-card":"tag-cash")+'">'+payLabel+'</span>';
    html+='<span class="sess-total">¥'+fmt(h.total)+'</span>';
    html+='</div>';
    // 明細
    html+='<div class="sess-detail" id="det-'+i+'">';
    (h.items||[]).sort((a,b)=>iso(a)-iso(b)).forEach(it=>{
      const lb=it.qty>1?it.label+" ×"+it.qty:it.label;
      const amt=it.isDiscount?"-¥"+fmt(Math.abs(it.price*(it.qty||1))):"¥"+fmt(Math.abs(it.price*(it.qty||1)));
      html+='<div class="detail-row'+(it.isDiscount?" disc":"")+'"><span>'+lb+'</span><span>'+amt+'</span></div>';
    });
    html+='<div class="detail-divider"></div>';
    html+='<div class="detail-row"><span>小計</span><span>¥'+fmt(h.subtotal)+'</span></div>';
    if((h.discount||0)>0)html+='<div class="detail-row disc"><span>割引</span><span>-¥'+fmt(h.discount)+'</span></div>';
    html+='<div class="detail-row"><span>税・SC ('+Math.round((h.rate||.25)*100)+'%)</span><span>¥'+fmt(h.tax)+'</span></div>';
    if(h.splits&&h.splits.length>1){
      html+='<div class="detail-divider"></div>';
      h.splits.forEach(sp=>html+='<div class="detail-row"><span>'+(sp.method==="card"?"カード":"現金")+(sp.receipt?" [領]":"")+'</span><span>¥'+fmt(sp.amount)+'</span></div>');
    }
    html+='<div class="detail-total"><span>合計</span><span>¥'+fmt(h.total)+'</span></div>';
    html+='</div>';
    html+='</div>';
  });
  html+='</div></div>';

  // キャスト別
  if(castRows.length){
    html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">キャスト別売上</span></div><div class="sec-body" style="padding:10px 16px;">';
    html+='<div class="cast-grid">';
    html+='<div class="cast-gh">キャスト</div><div class="cast-gh">本指名</div><div class="cast-gh">本指名売上</div><div class="cast-gh">場内延長</div><div class="cast-gh">場内延長売上</div>';
    castRows.forEach(r=>{
      html+='<div class="cast-gc">'+r.name+'</div>';
      html+='<div class="cast-gc">'+(r.honCnt?r.honCnt+'件':"—")+'</div>';
      html+='<div class="cast-gc'+(r.honSub?' val':'')+'">'+( r.honSub?"¥"+fmt(r.honSub):"—")+'</div>';
      html+='<div class="cast-gc">'+(r.beCnt?r.beCnt+'件':"—")+'</div>';
      html+='<div class="cast-gc'+(r.beSub?' val-s':'')+'">'+( r.beSub?"¥"+fmt(r.beSub):"—")+'</div>';
    });
    html+='</div></div></div>';
  }

  c.innerHTML=html;
}

function card(label,val,cls){return'<div class="card"><div class="card-label">'+label+'</div><div class="card-val '+cls+'">'+val+'</div></div>';}
function catRow(label,val,badge){return'<div class="cat-row"><span class="cat-label">'+label+(badge?'<span class="cat-badge">'+badge+'</span>':'')+'</span><span class="cat-val">¥'+fmt(val)+'</span></div>';}
function iso(i){if(i.isSet)return 0;if(i.isHonShimei)return 1;if(i.isBanaiShimei)return 2;if(i.label==="同伴料")return 3;if(i.isExtension)return 7;if(i.isDiscount)return 11;if(i.id?.startsWith("cd_"))return 9;return 8;}
function toggleDetail(i){const el=document.getElementById("det-"+i);if(el)el.classList.toggle("open");}
</script>
</body>
</html>
